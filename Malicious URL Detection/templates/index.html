<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: #333;
        }

        input[type="text"] {
            width: 400px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🔐 AI Phishing Detection System</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter website URL" required>
        <br><br>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <div class="result" style="color: {{ result[1] }};">
            {{ result[0] }}
        </div>
    {% endif %}

</body>
</html>
